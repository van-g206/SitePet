    <main>
        <form class="new-form">
            <div class="patas1">
                <img src="../img//png/patas.png"></img>
            </div>
            <div class="profile-image">
                <img src="https://th.bing.com/th/id/R.e5c95af14dfd03878d0bcc7344230389?rik=H5IqelV0wvfpfw&riu=http%3a%2f%2fgetdrawings.com%2fimg%2fman-silhouette-profile-17.jpg&ehk=pu%2fT%2bDN0bWum6YpgucHvjGlETMDdmmkpf6X7McLED4I%3d&risl=&pid=ImgRaw&r=0" alt="Perfil">
            </div>
            <h3>Meu Perfil</h3>
            <label for="email">E-mail:</label>
            <input type="text" id="email" name="email" placeholder="usuario@gmail.com" required disabled>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Usuário" required disabled>
            <label for="tel">Telefone:</label>
            <input type="text" id="tel" name="tel" placeholder="(11) 00000-0000" required disabled>
            <label for="dtnsc">Data de Nascimento:</label>
            <input type="text" id="dtnsc" name="dtnsc" placeholder="dd/mm/aaaa" required disabled>
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required disabled>
            <label for="preferences">Preferências:</label>
            <select id="preferences" name="preferences" required>
                <option value="" >Selecione</option>
                <option value="dog" selected disabled>Cachorro</option>
                <option value="cat">Gato</option>
            </select>
        </form>
        <form class="new-form2">

        </form>
    </main>
    <script src="perfil.js" defer></script>
